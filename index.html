<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4-Project</title>

    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef2ff;
            margin: 0;
        }

        .nav {
            background: #7aa2ff;
            padding: 12px;
            text-align: center;
        }

        .nav a {
            color: white;
            margin: 0 12px;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
        }

        input, select {
            padding: 10px;
            width: 250px;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            text-align: center;
        }

        button {
            margin-top: 10px;
            padding: 10px 20px;
            border: none;
            background: #7aa2ff;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #5f8cff;
        }

        ul {
            margin-top: 20px;
            padding: 0;
            list-style: none;
            width: 320px;
        }

        li {
            background: white;
            margin: 6px 0;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        footer {
            background: #7aa2ff;
            padding: 10px;
            text-align: center;
            color: white;
        }
    </style>
</head>

<body>

<div class="nav">
    <a href="index.html">Classmates</a>
    <a href="attendance.html">Attendance Tracker</a>
    <a href="photos.html">Gallery</a>
</div>

<div class="container">

    <h2>Grade 10 Classmates</h2>

    <input type="text" id="name" placeholder="Enter name">

    <select id="section">
        <option value="Topaz">Topaz</option>
        <option value="Sapphire">Sapphire</option>
        <option value="Ruby">Ruby</option>
        <option value="Emerald">Emerald</option>
    </select>

    <button py-click="addStudent">Add</button>

    <ul id="list"></ul>
</div>

<footer>
    <p>Marcus Law & Anakin Batac | 10-Sapphire</p>
</footer>

<py-script src="main.py"></py-script>

</body>
</html>
