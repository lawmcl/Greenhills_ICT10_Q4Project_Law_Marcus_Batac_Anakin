<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4-Project-Attendance</title>

    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef2ff;
            margin: 0;
        }

        .nav {
            background: #7aa2ff;
            padding: 12px;
            text-align: center;
        }

        .nav a {
            color: white;
            margin: 0 12px;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 30px;
            padding: 30px;
            flex-wrap: wrap;
        }

        .panel {
            background: white;
            padding: 20px;
            border-radius: 12px;
            width: 260px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        select, input, button {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            cursor: pointer;
            background: #7aa2ff;
            color: white;
            border: none;
            transition: 0.2s;
        }

        button:hover {
            background: #5f8cff;
        }

        #output {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        footer {
            background: #7aa2ff;
            padding: 10px;
            text-align: center;
            color: white;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="nav">
    <a href="index.html">Classmates</a>
    <a href="attendance.html">Attendance Tracker</a>
    <a href="photos.html">Gallery</a>
</div>

<div class="container">

    <div class="panel">
        <h3>Grade 10 Attendance</h3>

        <label>Select Month</label>
        <select id="month">
            <option value="0">Aug</option>
            <option value="1">Sept</option>
            <option value="2">Oct</option>
            <option value="3">Nov</option>
            <option value="4">Dec</option>
            <option value="5">Jan</option>
            <option value="6">Feb</option>
            <option value="7">Mar</option>
            <option value="8">Apr</option>
            <option value="9">May</option>
        </select>

        <label>Absences</label>
        <input type="number" id="absences" min="0">

        <button py-click="add_data">Submit</button>
    </div>

    <div id="output"></div>

</div>

<footer>
    <p>Marcus Law & Anakin Batac | 10-Sapphire</p>
</footer>

<py-script src="main.py"></py-script>

</body>
</html>
