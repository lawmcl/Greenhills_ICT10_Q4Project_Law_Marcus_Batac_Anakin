<div class="container">

        <h3>Grade 10 Attendance</h3>

        <label>Select Month</label>
        <select id="month">
            <option value="August">August</option>
            <option value="September">September</option>
            <option value="October">October</option>
            <option value="November">November</option>
            <option value="December">December</option>
            <option value="January">January</option>
            <option value="February">February</option>
            <option value="March">March</option>
            <option value="April">April</option>
            <option value="May">May</option>
        </select>

        <label>Absences</label>
        <input type="number" id="absences" min="0" value="0">

        <button py-click="add_data">Submit</button>
    </div>

<script type="py" config='{"packages":["matplotlib", "numpy"]}'>
import matplotlib.pyplot as plt
from pyscript import display, document

months = []
absences = []

def add_data(event):
    month_val = document.querySelector("#month").value
    abs_val = document.querySelector("#absences").value
    
    if month_val in months:
        idx = months.index(month_val)
        absences[idx] = int(abs_val)
    else:
        months.append(month_val)
        absences.append(int(abs_val))
    
    plot_data()

def plot_data():
    plt.close('all')
    fig, ax = plt.subplots()
    ax.bar(months, absences, color='#7aa2ff')
    ax.set_ylabel('Number of Absences')
    ax.set_title('Monthly Attendance Report')
    
    output_div = document.querySelector("#output")
    output_div.innerHTML = ""
    display(fig, target="output")
</script>
