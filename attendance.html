<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4-Project Attendance</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

    <style>
        body {
            font-family: Arial;
            background:#92a8d1;
            margin:0;
        }

        .nav {
            background:#2d6cdf;
            padding:10px;
        }

        .nav a {
            color:white;
            margin-right:15px;
            text-decoration:none;
        }

        .container {
            display:flex;
            gap:20px;
            padding:20px;
        }

        .panel {
            background:white;
            padding:15px;
            border-radius:10px;
            width:220px;
        }

        select, button {
            width:100%;
            margin-top:10px;
            padding:6px;
        }

        button {
            cursor:pointer;
        }
    </style>
</head>

<body>

<div class="nav">
    <a href="index.html">Classmates</a>
    <a href="attendance.html">Attendance Tracker</a>
    <a href="photos.html">Gallery</a>
</div>

<div class="container">

    <div class="panel">
        <h3>Grade 10 Attendance</h3>

        <label>Select Month</label>
        <select id="month">
            <option value="0">Aug</option>
            <option value="1">Sept</option>
            <option value="2">Oct</option>
            <option value="3">Nov</option>
            <option value="4">Dec</option>
            <option value="5">Jan</option>
            <option value="6">Feb</option>
            <option value="7">Mar</option>
            <option value="8">Apr</option>
            <option value="9">May</option>
        </select>

        <button py-click="add_data">Generate Graph</button>
    </div>

    <div id="output"></div>

</div>

<py-script src="main.py"></py-script>

</body>
</html>
